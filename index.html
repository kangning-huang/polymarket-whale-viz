<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polybot Arena</title>
    <meta name="description" content="Watch elite trading bots compete in Polymarket crypto prediction markets. Study their strategies, entries, exits, and P&L in real-time." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect: decode path from 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#f85149;padding:20px;font-size:13px">JS Error: ' +
          msg + '\n' + (src||'') + ':' + line + ':' + col +
          '\n' + (err && err.stack || '') + '</pre>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
