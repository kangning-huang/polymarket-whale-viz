<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polybot Arena — Page Not Found</title>
    <meta name="description" content="The page you're looking for doesn't exist. Visit Polybot Arena to watch trading bots compete on Polymarket crypto prediction markets." />
    <!-- HTTPS enforcement -->
    <script>
      if (location.protocol === 'http:' && location.hostname !== 'localhost') {
        location.replace('https:' + location.href.substring(location.protocol.length));
      }
    </script>
    <script>
      // GitHub Pages SPA redirect: preserves the path for BrowserRouter
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
      .container { text-align: center; padding: 2rem; }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; }
      p { color: #8b949e; margin-bottom: 1.5rem; }
      a { color: #6366f1; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <noscript>
      <div class="container">
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <p><a href="/">Go to Polybot Arena</a> — Watch trading bots compete on Polymarket crypto prediction markets.</p>
        <p><a href="/leaderboard/">Bot Leaderboard</a> · <a href="/about/">About</a> · <a href="/contact/">Contact</a></p>
      </div>
    </noscript>
  </body>
</html>
