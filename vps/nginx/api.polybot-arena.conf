# Nginx configuration for api.polybot-arena.com
# SSE reverse proxy for live trading data
#
# Installation:
# 1. Copy to: /etc/nginx/sites-available/polybot-api
# 2. Create symlink: ln -s /etc/nginx/sites-available/polybot-api /etc/nginx/sites-enabled/
# 3. Get SSL cert: certbot certonly --nginx -d api.polybot-arena.com
# 4. Test config: nginx -t
# 5. Reload: systemctl reload nginx

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.polybot-arena.com;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server with SSE proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.polybot-arena.com;

    # SSL configuration (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.polybot-arena.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.polybot-arena.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers (handled by Express, but adding for preflight)
    add_header Access-Control-Allow-Origin "https://polybot-arena.com" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # SSE endpoints
    location /api/live/ {
        proxy_pass http://localhost:3001;

        # SSE-specific headers
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;

        # Prevent timeouts for long-lived connections
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check and metrics endpoints
    location /health {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/metrics {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Optional: restrict to internal IP
        # allow 127.0.0.1;
        # deny all;
    }

    location /api/debug/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Restrict debug endpoints to localhost only
        allow 127.0.0.1;
        deny all;
    }

    # Favicon (optional)
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # Access logs
    access_log /var/log/nginx/api.polybot-arena.access.log;
    error_log /var/log/nginx/api.polybot-arena.error.log;
}
