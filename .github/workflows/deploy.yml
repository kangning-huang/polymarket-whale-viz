name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: public/data/windows
          key: window-data-${{ github.run_id }}
          restore-keys: window-data-

      - uses: actions/cache@v4
        id: screenshot-cache
        with:
          path: public/images/*_pnl.png
          key: screenshots-${{ hashFiles('scripts/traders.json') }}

      - run: npm ci

      - name: Capture screenshots (if not cached)
        if: steps.screenshot-cache.outputs.cache-hit != 'true'
        run: node scripts/capture-screenshots.mjs

      - name: Sync price data from VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_HOST" ]; then
            mkdir -p ~/.ssh
            echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
            chmod 600 ~/.ssh/vps_key
            mkdir -p public/data/prices
            if rsync -avz --timeout=30 \
              -e "ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              root@${VPS_HOST}:/opt/polymarket/data/raw/prices/ \
              public/data/prices/; then
              echo "Synced $(ls public/data/prices/*.jsonl 2>/dev/null | wc -l) price files"
            else
              echo "Warning: VPS sync failed (timeout or connection error), continuing with cached data"
            fi
            rm -f ~/.ssh/vps_key
          else
            echo "VPS credentials not configured, skipping sync"
          fi

      - name: Fetch data
        run: node scripts/fetch-data.mjs

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
