name: Update & Deploy

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch: {} # Manual trigger
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Restore cached window data (resolved windows are immutable)
      - uses: actions/cache@v4
        with:
          path: public/data/windows
          key: window-data-${{ github.run_id }}
          restore-keys: window-data-

      - run: npm ci

      # Fetch latest data from Polymarket APIs
      - run: node scripts/fetch-data.mjs

      # Build the Vite app
      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
