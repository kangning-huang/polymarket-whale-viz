name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            public/data/windows
            public/data/prices
          key: window-data-${{ github.run_id }}
          restore-keys: window-data-

      - uses: actions/cache@v4
        id: screenshot-cache
        with:
          path: public/images/*_pnl.png
          key: screenshots-${{ hashFiles('scripts/traders.json') }}

      - run: npm ci

      - name: Capture screenshots (if not cached)
        if: steps.screenshot-cache.outputs.cache-hit != 'true'
        run: node scripts/capture-screenshots.mjs

      - name: Fetch data (using cached prices, no VPS sync)
        run: node scripts/fetch-data.mjs

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
